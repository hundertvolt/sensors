name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    # Gates on src/ and tests/ only, NOT improved-quality/ (the WIP refactor target, which has
    # hundreds of pre-existing, tracked-but-not-yet-fixed findings - see BACKLOG.md; running
    # scripts/lint.sh/typecheck.sh with no arguments here would make this job permanently red
    # regardless of what a given PR actually touches). Passing explicit paths overrides
    # pyproject.toml's `files`/default target for that one invocation without changing what a
    # plain `scripts/lint.sh`/`scripts/typecheck.sh` checks locally (still full-scope: see
    # scripts/typecheck.sh's `mypy "$@"` and ruff's own CLI-args-override-config behavior).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        run: pip install uv
      - name: Sync dev dependencies
        run: uv sync
      - name: Ruff (src/, tests/)
        run: uv run ruff check src tests
      - name: Mypy (src/, tests/)
        run: uv run scripts/typecheck.sh src tests

  unit-tests:
    # Tests run under a real MicroPython Unix-port interpreter, not CPython - see
    # BACKLOG.md's "Self-contained venv via uv" testing requirement and tests/README.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        run: pip install uv
      - name: Cache MicroPython Unix port build
        uses: actions/cache@v6
        with:
          path: ~/pico-toolchain
          # Must also hash toolchain/setup_toolchain.py, not just versions.toml: the Unix port's
          # build flags (e.g. MICROPY_PY_SYS_SETTRACE=1 - see build_unix_port()) live in that
          # script, not in versions.toml. Keying on versions.toml alone let a stale cached binary
          # built before that flag existed survive untouched across this PR's own commits - a real
          # bug, not hypothetical: it's exactly what caused `scripts/test.sh --coverage` to fail in
          # CI with "module 'sys' has no attribute 'settrace'" while working locally, since a local
          # run always starts from a genuinely fresh ~/pico-toolchain.
          key: unix-port-${{ runner.os }}-${{ hashFiles('toolchain/versions.toml', 'toolchain/setup_toolchain.py') }}
      - name: Run unit tests
        run: scripts/test.sh
      # Coverage is a report, not a gate (see tests/README.md's "Coverage" section) - never let
      # it fail the job. The `Run unit tests` step above is the real pass/fail signal; this just
      # re-runs the same suite under the same Unix port binary (always built with
      # MICROPY_PY_SYS_SETTRACE=1 - see build_unix_port()), wrapped by tests/_coverage_runner.py
      # this time, to measure src/ line coverage.
      - name: Run unit tests with coverage
        run: scripts/test.sh --coverage
        continue-on-error: true
      - name: Add coverage summary to job summary
        if: hashFiles('coverage_summary.md') != ''
        run: cat coverage_summary.md >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true
      # Free for public repos; needs a CODECOV_TOKEN repo secret (or Codecov's tokenless PR-from-
      # fork support) once this repo is registered at codecov.io - not something CI itself can set
      # up. fail_ci_if_error keeps a missing/invalid token from ever failing the job either way.
      - name: Upload coverage to Codecov
        if: hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
      - name: Upload HTML coverage report artifact
        if: hashFiles('htmlcov/index.html') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov/
        continue-on-error: true
